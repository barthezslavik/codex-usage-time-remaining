  <rect width="1280" height="800" fill="#171717"/>
  <rect x="58" y="90" width="1164" height="430" rx="42" fill="#202020" stroke="#303030" stroke-width="2"/>
  <text x="108" y="178" fill="#a8a8a8" font-family="Arial, sans-serif" font-size="30" font-weight="700">Weekly usage limit</text>
