<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc">
  <title id="title">Codex Usage Time Remaining preview</title>
  <desc id="desc">Dark usage card with green quota bar and blue time remaining bar.</desc>
  <rect width="1000" height="500" fill="#171717"/>
  <rect x="60" y="70" width="880" height="320" rx="36" fill="#202020" stroke="#303030" stroke-width="2"/>
  <text x="110" y="145" fill="#a8a8a8" font-family="Arial, sans-serif" font-size="28" font-weight="700">Weekly usage limit</text>
  <text x="110" y="218" fill="#ffffff" font-family="Arial, sans-serif" font-size="52" font-weight="700">75%</text>
  <text x="222" y="218" fill="#ffffff" font-family="Arial, sans-serif" font-size="34">remaining</text>
  <rect x="110" y="270" width="780" height="20" rx="10" fill="#ebebf0"/>
  <rect x="110" y="270" width="585" height="20" rx="10" fill="#22c55e"/>
  <rect x="110" y="306" width="780" height="20" rx="10" fill="#ebebf0"/>
  <rect x="110" y="306" width="475" height="20" rx="10" fill="#0ea5e9"/>
  <text x="110" y="366" fill="#a8a8a8" font-family="Arial, sans-serif" font-size="24">Green: quota remaining · Blue: time remaining</text>
</svg>
